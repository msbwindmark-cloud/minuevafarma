{% extends "base.html" %}
{% block title %}Nueva contraseña - MiNuevaFarma{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="text-center">Establecer nueva contraseña</h4>
                <p class="text-muted">Introduce el código recibido por email y tu nueva contraseña.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Código de email</label>
                        <input type="text" name="codigo" class="form-control" placeholder="123456" required>
                    </div>
                    <div class="mb-3">{{ form.password1 }}</div>
                    <div class="mb-3">{{ form.password2 }}</div>
                    <button type="submit" class="btn btn-primary w-100">Guardar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
