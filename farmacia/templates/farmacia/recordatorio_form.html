{% extends "base.html" %}
{% block title %}Nuevo recordatorio{% endblock %}
{% block content %}
<nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Inicio</a></li><li class="breadcrumb-item"><a href="{% url 'recordatorio_list' %}">Recordatorios</a></li><li class="breadcrumb-item active">Nuevo</li></ol></nav>
<div class="card shadow mx-auto" style="max-width:600px;">
<div class="card-body">
<h4><i class="bi bi-bell"></i> Nuevo recordatorio</h4>
<form method="post">{% csrf_token %}
<div class="mb-2"><label class="form-label">Nombre cliente</label><input name="cliente_nombre" class="form-control"></div>
<div class="mb-2"><label class="form-label">Email</label><input type="email" name="cliente_email" class="form-control"></div>
<div class="mb-2"><label class="form-label">Teléfono</label><input name="cliente_telefono" class="form-control"></div>
<div class="mb-2"><label class="form-label">Producto</label><input name="producto" class="form-control" placeholder="Ej. Paracetamol 1g"></div>
<div class="mb-2"><label class="form-label">Tipo</label><select name="tipo" class="form-control"><option value="TRATAMIENTO">Recordatorio de toma</option><option value="REPOSICION">Reposición</option><option value="CITA">Cita/revisión</option></select></div>
<div class="mb-2"><label class="form-label">Mensaje</label><textarea name="mensaje" class="form-control" rows="3" required placeholder="Texto del recordatorio..."></textarea></div>
<div class="d-flex gap-2">
<button name="guardar" class="btn btn-secondary"><i class="bi bi-save"></i> Guardar pendiente</button>
<button name="enviar" class="btn btn-primary"><i class="bi bi-send"></i> Crear y enviar ahora</button>
<a href="{% url 'recordatorio_list' %}" class="btn btn-light">Cancelar</a>
</div>
</form>
</div></div>
{% endblock %}
