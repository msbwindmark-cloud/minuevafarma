{% extends "base.html" %}
{% block title %}Recuperar contraseña - MiNuevaFarma{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="text-center">Recuperar contraseña</h4>
                <p class="text-muted">Introduce tu email y te enviaremos un código.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">{{ form.email }}</div>
                    <button type="submit" class="btn btn-primary w-100">Enviar código</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
