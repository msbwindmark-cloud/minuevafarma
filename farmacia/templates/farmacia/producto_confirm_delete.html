{% extends "base.html" %}
{% block title %}Eliminar producto{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow border-danger">
            <div class="card-body text-center">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem;"></i>
                <h4 class="mt-2">¿Eliminar producto?</h4>
                <p><strong>{{ producto.nombre }}</strong> ({{ producto.codigo }})</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Sí, eliminar</button>
                    <a href="{% url 'producto_list' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
