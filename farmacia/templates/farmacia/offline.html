<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiNuevaFarma Offline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.5/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.5/dist/sweetalert2.all.min.js"></script>
    <script src="/static/pwa/app.js"></script>
    <script src="/static/pwa/offline.js"></script>
</head>
<body class="bg-light">
    <div id="vista"></div>
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js', {scope:'/'}).catch(function(e){ console.log('SW error', e); }); }</script>
    {% if usuario_json %}
    <script>
        var USUARIO = {{ usuario_json|safe }};
        var TOKEN = "{{ token_json }}";
        var PRODUCTOS_INICIAL = {{ productos_json|safe }};
        if (USUARIO && TOKEN) {
            localStorage.setItem("mf_token", TOKEN);
            localStorage.setItem("mf_user", JSON.stringify(USUARIO));
            localStorage.setItem("mf_user_local", USUARIO.username);
        }
        if (PRODUCTOS_INICIAL && window.MiFarmaOffline) {
            MiFarmaOffline.guardarProductos(PRODUCTOS_INICIAL);
        }
    </script>
    {% endif %}
</body>
</html>
