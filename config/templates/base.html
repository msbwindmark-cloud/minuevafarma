<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MiNuevaFarma{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.5/dist/sweetalert2.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">
    {% if user.is_authenticated %}
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}"><i class="bi bi-capsule"></i> MiNuevaFarma</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'dashboard' %}"><i class="bi bi-house"></i> Inicio</a>
                <a class="nav-link" href="{% url 'producto_list' %}"><i class="bi bi-box-seam"></i> Productos</a>
                <a class="nav-link" href="{% url 'empleado_list' %}"><i class="bi bi-people"></i> Empleados</a>
                <span class="nav-item text-white me-3 mt-2">{{ user.nombre_completo }}</span>
                <a class="nav-link" href="{% url 'perfil' %}"><i class="bi bi-person"></i> Perfil</a>
                <a class="nav-link" href="{% url 'auditoria' %}"><i class="bi bi-shield-check"></i> Auditoría</a>
                {% if user.is_superuser %}<a class="nav-link" href="{% url 'admin:index' %}" target="_blank"><i class="bi bi-gear"></i> Admin</a>{% endif %}
                <a class="nav-link" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right"></i> Salir</a>
            </div>
        </div>
    </nav>
    {% endif %}
    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.5/dist/sweetalert2.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script>
        toastr.options = { closeButton: true, progressBar: true, positionClass: "toast-top-right", timeOut: 4000 };
        {% if messages %}
            {% for message in messages %}
                {% if message.tags == 'success' %} toastr.success("{{ message }}"); {% endif %}
                {% if message.tags == 'error' %} toastr.error("{{ message }}"); {% endif %}
                {% if message.tags == 'warning' %} toastr.warning("{{ message }}"); {% endif %}
                {% if message.tags == 'info' %} toastr.info("{{ message }}"); {% endif %}
            {% endfor %}
        {% endif %}
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
